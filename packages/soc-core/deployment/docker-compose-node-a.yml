services:
  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.7.3
    hostname: wazuh.indexer
    environment:
      - "OPENSEARCH_INITIAL_ADMIN_PASSWORD=SecretPassword123!"
      - "DISABLE_JAVASECURITY=true"
      - "node.name=wazuh.indexer"
      - "discovery.type=single-node"
      - "bootstrap.memory_lock=true"
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh-indexer-data:/usr/share/wazuh-indexer/data

  wazuh.manager:
    image: wazuh/wazuh-manager:4.7.3
    hostname: wazuh.manager
    depends_on:
      - wazuh.indexer
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword123!
      - WAZUH_CLUSTER_MASTER=true
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    volumes:
      - wazuh-manager-data:/var/ossec/data
      # Removed volume mapping for ossec.conf to allow internal initialization

volumes:
  wazuh-indexer-data:
  wazuh-manager-data:
