---
# Phase 30.4 — SSH Security Hardening for Node A and Node B
# Run: ansible-playbook -i deployment/production_inventory.ini deployment/harden_ssh.yml
#
# What this does:
#   1. Changes SSH port 22 → 2222
#   2. Disables password authentication (key-only)
#   3. Disables root login
#   4. Installs and configures fail2ban
#   5. Updates UFW rules for new SSH port
#   6. Verifies connectivity on new port before closing old one
#
# PREREQUISITE: SSH keys must be deployed before running this playbook.
# Test with: ansible all -i production_inventory.ini -m ping

- name: "Phase 30.4 — SSH Hardening (Node A + B)"
  hosts: all
  become: yes
  vars:
    new_ssh_port: 2222
    fail2ban_max_retry: 5
    fail2ban_ban_time: 3600   # 1 hour ban
    fail2ban_find_time: 600   # 10 minute window

  tasks:
    # ── Step 1: Install fail2ban ────────────────────────────────────────────
    - name: Install fail2ban
      apt:
        name: fail2ban
        state: present
        update_cache: yes

    - name: Configure fail2ban for SSH
      copy:
        dest: /etc/fail2ban/jail.d/sshd.conf
        content: |
          [sshd]
          enabled  = true
          port     = {{ new_ssh_port }}
          filter   = sshd
          logpath  = /var/log/auth.log
          maxretry = {{ fail2ban_max_retry }}
          bantime  = {{ fail2ban_ban_time }}
          findtime = {{ fail2ban_find_time }}
          backend  = systemd

    - name: Enable and start fail2ban
      systemd:
        name: fail2ban
        enabled: yes
        state: restarted

    # ── Step 2: Harden sshd_config ─────────────────────────────────────────
    - name: Change SSH port to {{ new_ssh_port }}
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?Port "
        line: "Port {{ new_ssh_port }}"
        backup: yes

    - name: Disable root login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PermitRootLogin"
        line: "PermitRootLogin no"

    - name: Disable password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"

    - name: Disable challenge-response auth
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?ChallengeResponseAuthentication"
        line: "ChallengeResponseAuthentication no"

    - name: Set MaxAuthTries to 3
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?MaxAuthTries"
        line: "MaxAuthTries 3"

    - name: Set LoginGraceTime to 30s
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?LoginGraceTime"
        line: "LoginGraceTime 30"

    # ── Step 3: UFW — allow new port before changing ────────────────────────
    - name: Allow new SSH port in UFW before restart
      ufw:
        rule: allow
        port: "{{ new_ssh_port }}"
        proto: tcp
        comment: "SSH hardened port"

    # ── Step 4: Restart SSH (stays alive on old port during session) ────────
    - name: Restart SSH service
      systemd:
        name: sshd
        state: restarted

    # ── Step 5: Remove old port 22 from UFW ────────────────────────────────
    - name: Remove old SSH port 22 from UFW
      ufw:
        rule: allow
        port: "22"
        proto: tcp
        delete: yes
      ignore_errors: yes  # ok if port 22 rule didn't exist

    # ── Step 6: Verify SSH on new port ─────────────────────────────────────
    - name: Verify SSH is listening on {{ new_ssh_port }}
      command: "ss -tlnp | grep :{{ new_ssh_port }}"
      register: ssh_check
      failed_when: ssh_check.rc != 0
      changed_when: false

    - name: Show SSH port status
      debug:
        msg: "✅ SSH now listening on port {{ new_ssh_port }}"

    # ── Step 7: UFW status ──────────────────────────────────────────────────
    - name: Show UFW rules
      command: ufw status numbered
      register: ufw_status
      changed_when: false

    - name: Print UFW status
      debug:
        var: ufw_status.stdout_lines
