name: Synapse Security Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  isolation-and-safety-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Isolation Tests
        run: python3 tests/test_isolation.py
      - name: Run Phase 7 Safety Tests
        run: python3 tests/test_phase7.py
        env:
          SOAR_DRY_RUN: "true"
          GEMINI_RPM_LIMIT: "15"

  live-triage-test:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Phase 5 Report Test
        run: python3 tests/test_phase5.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SOAR_DRY_RUN: "true"
          GEMINI_RPM_LIMIT: "15"
